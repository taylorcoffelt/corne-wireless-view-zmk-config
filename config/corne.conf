# Enable deep sleep after 30 minutes of inactivity to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Uncomment to boost TX power if you see signal-related dropouts (costs battery)
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable ZMK Studio for Realtime Keymap Updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Uncomment the following line to enable USB Logging (this increases power usage by a significant amount, turn it off when not in use)
# CONFIG_ZMK_USB_LOGGING=y

# Improve connection stability (disables 2M PHY); planned to become default upstream.
# Note: do NOT use CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES here -- it also pulls in the
# experimental security changes, which break pairing on this setup.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
